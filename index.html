<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合利他命 KOL 詢價與合作成效智庫</title>
    <!-- Tailwind CSS 用於精美排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons 用於質感圖示 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel 用於瀏覽器即時編譯（免打包） -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="root"></div>

    <!-- 核心 React & 業務邏輯，瀏覽器可直接解析 -->
    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ==================== 初始 Mock 資料 ====================
        const INITIAL_KOLS = [
          {
            id: "kol_001",
            name: "Dinner Lin",
            type: "美食生活 / 實測好物",
            links: { fb: "", ig: "https://instagram.com/dinner_lin", yt: "https://youtube.com/shorts/cgqutkKB2oY", tiktok: "" },
            followers: { fb: 0, ig: 180000, yt: 450000, tiktok: 0 },
            videoViews: 1680000,
            genderRatio: { male: 40, female: 60 },
            ageRatio: { "18-24": 30, "25-34": 50, "35-44": 15, "45+": 5 },
            recommendedPlatform: "YouTube Shorts",
            recommendReason: "節奏極快、受眾黏著度高。適合用好市多爆紅好物實測的邏輯，置入合利他命 HICEE 或 A25。"
          },
          {
            id: "kol_002",
            name: "陳醫師的健康生活",
            type: "專業醫療 / 養生保健",
            links: { fb: "https://facebook.com/dr_chen_health", ig: "https://instagram.com/dr_chen_ig", yt: "https://youtube.com/c/dr_chen_health", tiktok: "" },
            followers: { fb: 150000, ig: 80000, yt: 120000, tiktok: 0 },
            videoViews: 45000,
            genderRatio: { male: 45, female: 55 },
            ageRatio: { "18-24": 10, "25-34": 40, "35-44": 35, "45+": 15 },
            recommendedPlatform: "YouTube",
            recommendReason: "身分具備專業醫師執照，講解合利他命 EXP 的維生素 B 群與科學原理極具說服力。"
          }
        ];

        const INITIAL_QUOTES = [
          {
            id: "quote_001",
            kolId: "kol_001",
            campaignName: "2026年Q2 HICEE好物推薦案",
            product: "HICEE",
            vendor: "快點數位行銷",
            inquiryDate: "2026-04-10",
            prices: { verticalVideo: 45000, multiImage: 25000 },
            authDuration: "3個月",
            authCost: 10000
          },
          {
            id: "quote_002",
            kolId: "kol_001",
            campaignName: "2026年Q3 A25通路推廣案",
            product: "A25",
            vendor: "星潮娛樂媒體",
            inquiryDate: "2026-06-01",
            prices: { singleImage: 22000, ytHorizontalVideo: 85000 },
            authDuration: "3個月",
            authCost: 12000
          }
        ];

        const INITIAL_COLLABORATIONS = [
          {
            id: "collab_001",
            kolId: "kol_001",
            quoteId: "quote_001",
            campaignName: "2026年Q2 HICEE好物推薦案",
            product: "HICEE",
            specs: ["verticalVideo"],
            postLink: "https://youtube.com/shorts/cgqutkKB2oY",
            reach: 1850000,
            views: 1687446,
            likes: 27480,
            shares: 8400,
            comments: 920,
            warningNotes: "Dinner Lin 腳本配合度高，但置入切角要求生活化，不接受生硬的大字報，文案需保留創作者語氣。",
            ratingCooperation: 5,
            ratingSatisfaction: 5
          }
        ];

        function App() {
          const [kols, setKols] = useState(INITIAL_KOLS);
          const [quotes, setQuotes] = useState(INITIAL_QUOTES);
          const [collaborations, setCollaborations] = useState(INITIAL_COLLABORATIONS);
          
          const [activeTab, setActiveTab] = useState('database'); 
          const [searchTerm, setSearchTerm] = useState('');
          const [selectedTypeFilter, setSelectedTypeFilter] = useState('');
          const [selectedProductTab, setSelectedProductTab] = useState('ALL'); 
          const [selectedKOL, setSelectedKOL] = useState(null); 
          const [showCollabModal, setShowCollabModal] = useState(false);

          // 批次上傳與手動填寫表單 State
          const [uploadVendor, setUploadVendor] = useState('');
          const [uploadDate, setUploadDate] = useState(new Date().toISOString().split('T')[0]);
          const [uploadCampaignName, setUploadCampaignName] = useState('');
          const [uploadProduct, setUploadProduct] = useState('EXP');
          const [pastedData, setPastedData] = useState('');

          const [collabForm, setCollabForm] = useState({
            id: '', kolId: '', quoteId: '', campaignName: '', product: 'EXP', specs: [],
            postLink: '', reach: '', views: '', likes: '', shares: '', comments: '',
            warningNotes: '', ratingCooperation: 5, ratingSatisfaction: 5
          });

          useEffect(() => {
            // 初始化 Lucide 圖示
            if (window.lucide) {
                window.lucide.createIcons();
            }
          }, [activeTab, selectedKOL, showCollabModal]);

          const filteredKOLs = useMemo(() => {
            return kols.filter(kol => {
              const matchSearch = kol.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                  kol.type.toLowerCase().includes(searchTerm.toLowerCase());
              const matchType = selectedTypeFilter ? kol.type.includes(selectedTypeFilter) : true;
              
              let matchProduct = true;
              if (selectedProductTab !== 'ALL') {
                const hasQuote = quotes.some(q => q.kolId === kol.id && q.product === selectedProductTab);
                const hasCollab = collaborations.some(c => c.kolId === kol.id && c.product === selectedProductTab);
                matchProduct = hasQuote || hasCollab;
              }
              return matchSearch && matchType && matchProduct;
            });
          }, [kols, quotes, collaborations, searchTerm, selectedTypeFilter, selectedProductTab]);

          const handleQuickCollab = (kolId = '') => {
            const existing = collaborations.find(c => c.kolId === kolId);
            const matchedQuote = quotes.find(q => q.kolId === kolId);
            setCollabForm(existing ? { ...existing } : {
              id: '', kolId: kolId, quoteId: matchedQuote ? matchedQuote.id : '', campaignName: '', product: 'EXP',
              specs: [], postLink: '', reach: '', views: '', likes: '', shares: '', comments: '',
              warningNotes: '', ratingCooperation: 5, ratingSatisfaction: 5
            });
            setShowCollabModal(true);
          };

          const handleSaveCollab = (e) => {
            e.preventDefault();
            const matchedQuote = quotes.find(q => q.id === collabForm.quoteId);
            const newCollab = {
              ...collabForm,
              id: collabForm.id || 'collab_' + Date.now(),
              campaignName: matchedQuote ? matchedQuote.campaignName : '常態推廣',
              product: matchedQuote ? matchedQuote.product : 'EXP',
              reach: Number(collabForm.reach) || 0,
              views: Number(collabForm.views) || 0,
              likes: Number(collabForm.likes) || 0,
              shares: Number(collabForm.shares) || 0,
              comments: Number(collabForm.comments) || 0,
            };

            const idx = collaborations.findIndex(c => c.kolId === collabForm.kolId);
            if (idx >= 0) {
              const updated = [...collaborations];
              updated[idx] = newCollab;
              setCollaborations(updated);
            } else {
              setCollaborations([newCollab, ...collaborations]);
            }
            setShowCollabModal(false);
          };

          const handleSimulatedUpload = () => {
            if (!uploadVendor || !uploadCampaignName) {
              alert('請填寫完整 Campaign Name 與 報價廠商！');
              return;
            }
            const newKolId = 'kol_' + Date.now();
            const newKol = {
              id: newKolId,
              name: "林小野 Life",
              type: "生活日常 / 辦公室日常",
              links: { fb: "", ig: "https://instagram.com/wild_forest_life", yt: "", tiktok: "" },
              followers: { fb: 0, ig: 120000, yt: 0, tiktok: 0 },
              videoViews: 32000,
              genderRatio: { male: 35, female: 65 },
              ageRatio: { "18-24": 25, "25-34": 50, "35-44": 20, "45+": 5 },
              recommendedPlatform: "Instagram",
              recommendReason: "適合日常置入，輕鬆好笑。"
            };
            const newQuote = {
              id: 'quote_' + Date.now(),
              kolId: newKolId,
              campaignName: uploadCampaignName,
              product: uploadProduct,
              vendor: uploadVendor,
              inquiryDate: uploadDate,
              prices: { verticalVideo: 30000, multiImage: 22000 }
            };

            setKols([newKol, ...kols]);
            setQuotes([newQuote, ...quotes]);
            alert('成功模擬解析 Excel，已匯入 KOL「林小野 Life」報價資料！');
            setActiveTab('database');
          };

          return (
            <div className="flex flex-col min-h-screen">
              {/* 頂部導覽 */}
              <header className="bg-gradient-to-r from-red-700 via-red-600 to-amber-600 text-white shadow-md">
                <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row items-center justify-between gap-4">
                  <div className="flex items-center space-x-3">
                    <div className="bg-white px-2 py-1 rounded text-red-600 font-black text-lg">合利他命</div>
                    <div>
                      <h1 className="text-md font-bold">KOL 詢價與合作成效智庫</h1>
                      <p className="text-[10px] text-red-100">內部專用 • Post-buy 數據與防踩雷系統</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <button 
                      onClick={() => handleQuickCollab()}
                      className="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-bold px-3 py-2 rounded-lg shadow"
                    >
                      📝 登載合作成效 (Post-buy)
                    </button>
                    <nav className="flex bg-red-800/40 p-1 rounded-lg text-xs font-bold">
                      <button onClick={() => setActiveTab('database')} className={`px-3 py-1.5 rounded ${activeTab === 'database' ? 'bg-white text-red-700' : 'text-white'}`}>KOL 詢價查詢</button>
                      <button onClick={() => setActiveTab('showcase')} className={`px-3 py-1.5 rounded ${activeTab === 'showcase' ? 'bg-white text-red-700' : 'text-white'}`}>📱 合作成效看板</button>
                      <button onClick={() => setActiveTab('upload')} className={`px-3 py-1.5 rounded ${activeTab === 'upload' ? 'bg-white text-red-700' : 'text-white'}`}>批次匯入報價</button>
                    </nav>
                  </div>
                </div>
              </header>

              {/* 產品線快速篩選 Tab */}
              <section className="bg-white border-b border-slate-200 py-3">
                <div className="max-w-7xl mx-auto px-4 flex flex-wrap gap-2 items-center">
                  <span className="text-xs font-bold text-slate-400">產品線快速篩選：</span>
                  {['ALL', 'EXP', 'EXG', 'A25', 'HICEE', 'Controloc'].map(p => (
                    <button
                      key={p}
                      onClick={() => setSelectedProductTab(p)}
                      className={`px-3 py-1 rounded-lg text-xs font-bold transition ${selectedProductTab === p ? 'bg-red-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                    >
                      {p === 'ALL' ? '全部產品' : p}
                    </button>
                  ))}
                </div>
              </section>

              {/* 主要工作區 */}
              <main className="flex-grow max-w-7xl w-full mx-auto px-4 py-6">
                {activeTab === 'database' && (
                  <div className="space-y-6">
                    <div className="bg-white p-4 rounded-xl border border-slate-200 flex flex-col md:flex-row gap-4 items-center">
                      <input 
                        type="text" 
                        placeholder="搜尋 KOL 姓名、分類..." 
                        className="border border-slate-300 rounded-lg p-2 text-xs w-full md:w-80"
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                      />
                      <select 
                        value={selectedTypeFilter} 
                        onChange={(e) => setSelectedTypeFilter(e.target.value)}
                        className="border border-slate-300 rounded-lg p-2 text-xs"
                      >
                        <option value="">所有分類</option>
                        <option value="美食">美食生活</option>
                        <option value="醫療">專業醫療</option>
                      </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {filteredKOLs.map(kol => {
                        const kolQuotes = quotes.filter(q => q.kolId === kol.id);
                        const latestQuote = [...kolQuotes].sort((a,b) => new Date(b.inquiryDate) - new Date(a.inquiryDate))[0];
                        const collab = collaborations.find(c => c.kolId === kol.id);
                        return (
                          <div key={kol.id} className="bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm flex flex-col justify-between">
                            <div className="p-5 border-b border-slate-100 flex justify-between items-start">
                              <div>
                                <span className="bg-slate-100 text-slate-600 text-[10px] px-2 py-0.5 rounded-full font-bold">{kol.type}</span>
                                <h3 className="text-lg font-black mt-1 text-slate-900">{kol.name}</h3>
                              </div>
                              <span className={`text-[10px] font-bold px-2 py-1 rounded-full ${collab ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-500'}`}>
                                {collab ? '🟢 已合作過' : '⚪ 未合作過'}
                              </span>
                            </div>

                            <div className="p-5 space-y-4 flex-grow">
                              {/* 詢價資訊，避免混淆 */}
                              <div className="bg-slate-50 p-3 rounded-lg border border-slate-100 text-xs">
                                <span className="text-[10px] text-slate-400 font-bold block mb-1">最新單期詢價方案</span>
                                {latestQuote ? (
                                  <div className="space-y-1 text-slate-700">
                                    <p>Campaign: <strong>{latestQuote.campaignName} ({latestQuote.product})</strong></p>
                                    <p>報價廠商: <strong>{latestQuote.vendor} ({latestQuote.inquiryDate})</strong></p>
                                    <div className="grid grid-cols-2 gap-1.5 mt-2">
                                      {latestQuote.prices.verticalVideo && <div className="bg-white p-1 rounded border">短影音: ${latestQuote.prices.verticalVideo.toLocaleString()}</div>}
                                      {latestQuote.prices.multiImage && <div className="bg-white p-1 rounded border">多圖: ${latestQuote.prices.multiImage.toLocaleString()}</div>}
                                      {latestQuote.prices.singleImage && <div className="bg-white p-1 rounded border">單圖: ${latestQuote.prices.singleImage.toLocaleString()}</div>}
                                      {latestQuote.prices.ytHorizontalVideo && <div className="bg-white p-1 rounded border">YT長片: ${latestQuote.prices.ytHorizontalVideo.toLocaleString()}</div>}
                                    </div>
                                  </div>
                                ) : <span className="text-slate-400">尚無詢價紀錄</span>}
                              </div>

                              {collab && collab.warningNotes && (
                                <div className="bg-red-50 text-red-900 p-3 rounded-lg text-xs">
                                  <strong>⚠️ 避坑提醒：</strong>{collab.warningNotes}
                                </div>
                              )}
                            </div>

                            <div className="bg-slate-50 px-5 py-3 border-t flex justify-between items-center text-xs">
                              <button onClick={() => setSelectedKOL(kol)} className="text-red-700 font-bold">查看歷史比價與推薦原因 →</button>
                              <button onClick={() => handleQuickCollab(kol.id)} className="bg-slate-900 text-white px-3 py-1 rounded font-bold">登載成效</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* 合作成效實體預覽看板 */}
                {activeTab === 'showcase' && (
                  <div className="space-y-6">
                    <div className="bg-white p-4 rounded-xl border border-slate-200">
                      <h2 className="text-sm font-bold text-slate-800">📱 合作結案成效實體看板</h2>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                      {collaborations.map(collab => {
                        const kol = kols.find(k => k.id === collab.kolId);
                        if (!kol) return null;
                        return (
                          <div key={collab.id} className="bg-white rounded-xl border border-slate-200 overflow-hidden flex flex-col justify-between">
                            <div className="p-4 bg-slate-900 text-white flex justify-between items-center text-xs">
                              <span className="font-bold">{collab.campaignName}</span>
                              <span className="bg-red-600 px-2 py-0.5 rounded font-bold">{collab.product}</span>
                            </div>

                            <div className="p-5 space-y-4">
                              {/* 數據顯示 */}
                              <div className="grid grid-cols-5 gap-1 bg-slate-50 p-2.5 rounded-lg text-center text-[10px] font-bold">
                                <div>觸及<span className="block font-black text-slate-800 mt-0.5">{collab.reach.toLocaleString()}</span></div>
                                <div className="border-l">觀看<span className="block font-black text-red-600 mt-0.5">{collab.views.toLocaleString()}</span></div>
                                <div className="border-l">按讚<span className="block font-black text-slate-800 mt-0.5">{collab.likes.toLocaleString()}</span></div>
                                <div className="border-l">分享<span className="block font-black text-slate-800 mt-0.5">{collab.shares.toLocaleString()}</span></div>
                                <div className="border-l">留言<span className="block font-black text-slate-800 mt-0.5">{collab.comments.toLocaleString()}</span></div>
                              </div>

                              {/* Dinner Lin Shorts 還原 */}
                              {collab.postLink && collab.postLink.includes('cgqutkKB2oY') && (
                                <div className="bg-black rounded-lg overflow-hidden relative max-w-xs mx-auto aspect-[9/16] flex flex-col justify-between p-4 text-white">
                                  <div className="z-10 text-[9px] bg-red-600 px-2 py-0.5 rounded self-stauotes', newQuote.id), newQuote);
    } else {
      setKols(prev => [newKol, ...prev]);
      setQuotes(prev => [newQuote, ...prev]);
    }

    showNotice("匯入成功", `已成功匯入 KOL【${newKol.name}】至 HICEE 產品資料庫！`);
    setPastedData('');
    setUploadVendor('');
    setUploadCampaignName('');
    
    setTimeout(() => {
      setActiveTab('database');
      setUploadMessage(null);
    }, 1000);
  };

  const loadDemoExcelText = () => {
    setPastedData("林小野 Life\t生活日常\thttps://instagram.com/wild_forest_life\t120000\t32000\t男35%女65%\t25-34歲50%\tInstagram\t22000\t30000\t2個月\t8000");
    setUploadCampaignName("2026年Q2 HICEE好物推薦案");
    setUploadProduct("HICEE");
    setUploadVendor("快點數位行銷");
  };

  // ==================== 儲存合作成效數據 ====================
  const handleSaveCollaboration = async (e) => {
    e.preventDefault();
    if (!collabForm.kolId || !collabForm.quoteId) {
      showNotice("欄位缺失", "請務必選定 KOL 與採用的報價方案！", "error");
      return;
    }

    const matchedQuote = quotes.find(q => q.id === collabForm.quoteId);
    const updatedForm = {
      ...collabForm,
      id: collabForm.id || `collab_${Date.now()}`,
      campaignName: matchedQuote ? matchedQuote.campaignName : collabForm.campaignName,
      product: matchedQuote ? matchedQuote.product : collabForm.product,
      // 確保數據以純數字存檔
      reach: Number(collabForm.reach) || 0,
      views: Number(collabForm.views) || 0,
      likes: Number(collabForm.likes) || 0,
      shares: Number(collabForm.shares) || 0,
      comments: Number(collabForm.comments) || 0,
    };

    if (db && user) {
      await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'collaborations', updatedForm.id), updatedForm);
    } else {
      const existsIndex = collaborations.findIndex(c => c.kolId === updatedForm.kolId);
      if (existsIndex >= 0) {
        const updated = [...collaborations];
        updated[existsIndex] = updatedForm;
        setCollaborations(updated);
      } else {
        setCollaborations(prev => [updatedForm, ...prev]);
      }
    }

    setShowCollabModal(false);
    showNotice("數據存檔成功", "KOL 結案成效數據已即時同步雲端！");
  };

  // 快速開啟成效登載 Modal (全域按鈕 + 卡片按鈕通用)
  const openCollabEditor = (kolId = '') => {
    let baseForm = {
      id: '',
      kolId: kolId,
      quoteId: '',
      campaignName: '',
      product: 'EXP',
      specs: [],
      postLink: '',
      reach: '',
      views: '',
      likes: '',
      shares: '',
      comments: '',
      warningNotes: '',
      ratingCooperation: 5,
      ratingSatisfaction: 5
    };

    if (kolId) {
      const existing = collaborations.find(c => c.kolId === kolId);
      const matchedQuote = quotes.find(q => q.kolId === kolId);
      if (existing) {
        baseForm = { ...existing };
      } else if (matchedQuote) {
        baseForm.quoteId = matchedQuote.id;
      }
    }

    setCollabForm(baseForm);
    setShowCollabModal(true);
  };

  return (
    <div className="min-h-screen bg-slate-50 font-sans flex flex-col antialiased">
      
      {/* ==================== 精緻自訂通知 UI ==================== */}
      {notification && (
        <div className="fixed top-5 right-5 z-50 max-w-sm w-full bg-slate-900 text-white rounded-xl shadow-2xl p-4 border-l-4 border-red-600 animate-bounce">
          <div className="flex items-start">
            <div className="ml-3">
              <p className="text-sm font-bold">{notification.title}</p>
              <p className="mt-1 text-xs text-slate-300">{notification.message}</p>
            </div>
          </div>
        </div>
      )}

      {/* ==================== 頂部導覽列 (Alinamin 日系奢華配色) ==================== */}
      <header className="bg-gradient-to-r from-red-700 via-red-600 to-amber-600 text-white shadow-md sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-4 py-3 sm:px-6 lg:px-8 flex flex-col lg:flex-row items-center justify-between gap-4">
          <div className="flex items-center space-x-3">
            <div className="bg-white p-2 rounded-md shadow-inner flex items-center justify-center">
              <span className="text-red-600 font-black text-xl tracking-wider">合利他命</span>
            </div>
            <div>
              <h1 className="text-lg font-extrabold tracking-tight">KOL 詢價與合作成效智庫</h1>
              <p className="text-xs text-red-100 font-light">內部專用 • 防踩雷與 Post-buy 結案數據庫</p>
            </div>
          </div>
          
          <div className="flex items-center gap-3">
            {/* UI/UX 優化：直接置頂最核心的「登載合作成效」按鈕 */}
            <button
              onClick={() => openCollabEditor()}
              className="bg-emerald-600 hover:bg-emerald-500 text-white font-black px-4 py-2 rounded-lg text-xs sm:text-sm flex items-center gap-1.5 shadow-md transition-all"
            >
              <Edit3 className="w-4 h-4" />
              📝 登載合作成效 (Post-buy)
            </button>

            <nav className="flex gap-1 bg-red-800/40 p-1.5 rounded-xl">
              <button 
                onClick={() => setActiveTab('database')}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${activeTab === 'database' ? 'bg-white text-red-700 shadow' : 'text-white hover:bg-red-700/50'}`}
              >
                KOL 詢價查詢
              </button>
              <button 
                onClick={() => setActiveTab('showcase')}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${activeTab === 'showcase' ? 'bg-white text-red-700 shadow' : 'text-white hover:bg-red-700/50'}`}
              >
                📱 合作成效看板
              </button>
              <button 
                onClick={() => setActiveTab('upload')}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${activeTab === 'upload' ? 'bg-white text-red-700 shadow' : 'text-white hover:bg-red-700/50'}`}
              >
                批次匯入報價
              </button>
              <button 
                onClick={() => setActiveTab('template')}
                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${activeTab === 'template' ? 'bg-white text-red-700 shadow' : 'text-white hover:bg-red-700/50'}`}
              >
                Excel 規範
              </button>
            </nav>
          </div>
        </div>
      </header>

      {/* ==================== 快速產品線 Tab 篩選 (符合需求 5 - 捨棄無用指標，改為直覺產品切換) ==================== */}
      <section className="bg-white border-b border-slate-200 py-4 shadow-xs">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div className="flex flex-wrap gap-1.5">
              <span className="text-xs font-bold text-slate-400 self-center mr-2 uppercase tracking-wider">產品線篩選：</span>
              {[
                { key: 'ALL', label: '全部人選' },
                { key: 'EXP', label: 'EXP (黃金強效錠)' },
                { key: 'EXG', label: 'EXG (強效錠)' },
                { key: 'A25', label: 'A25 (日常活力)' },
                { key: 'HICEE', label: 'HICEE (維他命C)' },
                { key: 'Controloc', label: 'Controloc (胃藥)' }
              ].map(tab => (
                <button
                  key={tab.key}
                  onClick={() => setSelectedProductTab(tab.key)}
                  className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${selectedProductTab === tab.key ? 'bg-red-600 text-white shadow-xs' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                >
                  {tab.label}
                </button>
              ))}
            </div>

            <div className="text-xs text-slate-500 font-semibold bg-slate-100 px-3 py-1.5 rounded-lg">
              KOL 庫總計：{stats.totalKols} 位 | 詢價總筆數：{stats.totalQuotes} 筆
            </div>
          </div>
        </div>
      </section>

      {/* ==================== 主要工作區 ==================== */}
      <main className="flex-grow max-w-7xl w-full mx-auto px-4 py-8 sm:px-6 lg:px-8">
        
        {loading && (
          <div className="text-center py-12">
            <div className="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-red-600"></div>
            <p className="text-xs text-slate-500 mt-2">資料庫同步中...</p>
          </div>
        )}

        {/* ==================== 頁籤 1: KOL 資料庫主查詢 ==================== */}
        {!loading && activeTab === 'database' && (
          <div className="space-y-6">
            
            {/* 搜尋與過濾列 */}
            <div className="bg-white p-5 rounded-2xl shadow-xs border border-slate-200 flex flex-col md:flex-row gap-4 items-center justify-between">
              <div className="relative w-full md:w-96">
                <Search className="absolute left-3.5 top-3.5 text-slate-400 w-5 h-5" />
                <input 
                  type="text" 
                  placeholder="搜尋 KOL 姓名、類型或主要社群平台..." 
                  className="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-red-500 text-sm transition"
                  value={searchTerm}
                  onChange={(e) => setSearchTerm(e.target.value)}
                />
              </div>

              <div className="flex items-center gap-3">
                <select
                  value={selectedTypeFilter}
                  onChange={(e) => setSelectedTypeFilter(e.target.value)}
                  className="px-4 py-3 bg-slate-50 border border-slate-300 rounded-xl text-xs sm:text-sm font-medium text-slate-700"
                >
                  <option value="">所有 KOL 類型</option>
                  <option value="醫療">專業醫療</option>
                  <option value="運動">運動健身</option>
                  <option value="生活">生活日常</option>
                </select>
              </div>
            </div>

            {/* KOL 列表與卡片 (符合需求 6 & 1: 移除首頁推薦原因、極簡合作狀態標籤) */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              {filteredKOLs.map((ko  .row{display:flex; gap:16px; flex-wrap:wrap; align-items:end;} .row > div{flex:1; min-width:180px;}
  button.btn{
    background:var(--primary); color:#fff; border:none; padding:10px 20px; border-radius:8px;
    font-size:14px; font-weight:500; cursor:pointer;
  }
  button.btn:hover{background:var(--primary-hover);}
  button.btn.secondary{background:#fff; color:var(--primary); border:1px solid var(--primary);}
  button.btn.ghost{background:none; color:var(--warn); border:1px solid transparent; padding:6px 12px;}
  button.btn.small{padding:6px 12px; font-size:13px;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th, td{border-bottom:1px solid var(--line); padding:12px 10px; text-align:left;}
  th{color:var(--muted); font-weight:600; background:#f8f9fa;}
  .totalbar{display:flex; justify-content:space-between; align-items:center; background:#e8eaed; padding:16px 20px; border-radius:8px; margin-top:16px; font-size:15px; font-weight:600;}
  .totalbar b{font-size:20px; color:var(--primary);}
  .pill{font-size:11px; padding:2px 8px; border-radius:12px; background:#eee; color:#555;}
</style>
</head>
<body>
<header>
  <h1>媒體工具箱 Pro v3</h1>
  <div class="sub">獨立運作版 (支援多走期、小數點AC、客戶獨立媒體庫)</div>
</header>
<nav>
  <button data-tab="setup">設定</button>
  <button data-tab="clients">1. 客戶管理</button>
  <button data-tab="media" class="active">2. 媒體庫管理</button>
  <button data-tab="mediacue">3. Media Cue 產生器</button>
  <button data-tab="specs">4. 素材規範產生器</button>
</nav>

<main>
  <div class="panel" id="panel-setup">
    <div class="card">
      <h2>資料初始化</h2>
      <button class="btn" id="btnSeedLocal">匯入測試資料</button>
      <button class="btn ghost" id="btnClearData">清空資料</button>
    </div>
  </div>

  <div class="panel" id="panel-clients">
    <div class="card">
      <h2>新增客戶</h2>
      <div class="row">
        <div><input type="text" id="newClientName" placeholder="例如：Alinamin"></div>
        <div style="flex:0 0 auto;"><button class="btn" id="btnAddClient">新增客戶</button></div>
      </div>
      <table style="margin-top:16px;">
        <thead><tr><th>客戶名稱</th><th style="width:80px;">操作</th></tr></thead>
        <tbody id="clientTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="panel active" id="panel-media">
    <div class="card">
      <h2>新增客戶專屬媒體</h2>
      <p class="sub">媒體設定綁定客戶。不同客戶的同一個媒體（如YT），可能因為代理合約有不同的 AC%、單價。</p>
      <div class="row">
        <div><label>隸屬客戶</label><select id="newMediaClient"></select></div>
        <div><label>主媒體 (Media)</label><input type="text" id="newMediaMain" placeholder="例：Digital"></div>
        <div><label>平台 (Title)</label><input type="text" id="newMediaTitle" placeholder="例：YouTube"></div>
        <div><label>版位 (Position)</label><input type="text" id="newMediaPosition" placeholder="例：VRC 2.0 / Bumper"></div>
      </div>
      <div class="row" style="margin-top:12px;">
        <div><label>廣告形式 (Format)</label><input type="text" id="newMediaFormat" placeholder="例：Video / Banner"></div>
        <div><label>單價 (可不填)</label><input type="number" id="newMediaPrice" step="any"></div>
        <div><label>Model</label><input type="text" id="newMediaModel" placeholder="例：CPM / CPRP"></div>
        <div><label>AC% (例: 3.75)</label><input type="number" id="newMediaAC" step="any" placeholder="3.75"></div>
        <div style="flex:0 0 auto;"><button class="btn" id="btnAddMedia">新增</button></div>
      </div>
    </div>
    <div class="card">
      <h2>媒體庫總覽</h2>
      <div class="row" style="margin-bottom:12px; align-items:center;">
        <div style="max-width:200px;"><select id="filterMediaClient"><option value="ALL">顯示全部客戶</option></select></div>
      </div>
      <table>
        <thead><tr><th>客戶</th><th>主媒體</th><th>平台 (Title)</th><th>版位 (Position)</th><th>形式</th><th>單價 / Model</th><th>AC%</th><th>操作</th></tr></thead>
        <tbody id="mediaTableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="panel" id="panel-mediacue">
    <div class="card">
      <h2>專案基本資訊</h2>
      <div class="row">
        <div><label>選擇客戶</label><select id="mcClient"></select></div>
        <div><label>Campaign 名稱</label><input type="text" id="mcCampaignName"></div>
        <div><label>專案總走期</label><input type="text" id="mcTotalPeriod" placeholder="例: 2026/7/1-9/30"></div>
      </div>
    </div>

    <div class="card" style="background:#f8f9fa;">
      <h2>加入媒體版位至 Campaign</h2>
      <div class="row">
        <div style="flex:3;"><label>選擇該客戶的媒體 (可重複加入同一版位)</label><select id="mcMediaSelect"></select></div>
        <div style="flex:0 0 auto;"><button class="btn" id="btnAddMCRow">新增列</button></div>
      </div>
    </div>

    <div class="card">
      <h2>已選媒體 (可自訂走期與預算)</h2>
      <div id="selectedMediaRows" style="overflow-x:auto;">
        <table style="min-width:1000px;">
          <thead>
            <tr>
              <th style="width:25%">媒體版位</th>
              <th>獨立走期</th>
              <th style="width:10%">Media Price</th>
              <th style="width:8%">AC%</th>
              <th style="width:10%">AC Amt.</th>
              <th style="width:12%">Total Budget</th>
              <th style="width:5%"></th>
            </tr>
          </thead>
          <tbody id="mcTbody"><tr><td colspan="7" style="text-align:center;color:#888;">尚未加入任何媒體</td></tr></tbody>
        </table>
      </div>
      <div class="totalbar">
        <span>Total Budget 合計</span>
        <b id="mcGrandTotal">NT$ 0</b>
      </div>
      <div style="margin-top:20px; text-align:right;">
        <button class="btn" id="btnExportMediaCue" style="padding:12px 32px; font-size:16px;">匯出 Media Cue (.xlsx)</button>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-specs">
    <div class="card">
      <h2>勾選素材規範</h2>
      <div id="specChecklist">請先匯入測試資料</div>
      <div style="margin-top:20px; text-align:right;">
        <button class="btn" id="btnExportSpecs">匯出規範表 (.xlsx)</button>
      </div>
    </div>
  </div>
</main>

<script>
let db = { clients:[], media:[], specs:[] };
let mcRows = []; // { id, mediaId, period, price, acRate }

function loadData() {
  const saved = localStorage.getItem('mediaProDB_v3');
  if(saved) db = JSON.parse(saved);
  refreshUI();
}
function saveData() { localStorage.setItem('mediaProDB_v3', JSON.stringify(db)); refreshUI(); }
function clearData() { if(confirm("確定清空？")) { localStorage.removeItem('mediaProDB_v3'); db = {clients:[], media:[], specs:[]}; refreshUI(); } }

document.querySelectorAll('nav button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active'); document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  });
});

document.getElementById('btnSeedLocal').addEventListener('click', () => {
  db.clients = [{id: 'c1', name: 'Alinamin'}];
  db.media = [
    {id:'m1', clientId:'c1', media:'TV+OTV', title:'TV+MOD', position:'Cable', format:'Video', price:1240, model:'CPRP', ac:1},
    {id:'m2', clientId:'c1', media:'Digital', title:'YouTube', position:'VRC 2.0', format:'Video', price:80, model:'CPM', ac:3.75},
    {id:'m3', clientId:'c1', media:'Digital', title:'YouTube', position:'Non-Skippable 15s', format:'Video', price:180, model:'CPM', ac:4}
  ];
  db.specs = [{id:'s1', platform:'YouTube', format:'VRC 2.0', content:'16:9, MP4'}];
  saveData(); alert("測試資料匯入完成");
});
document.getElementById('btnClearData').addEventListener('click', clearData);

function refreshUI() {
  renderClients();
  renderMediaLibrary();
  renderMCClientSelect();
}

/* 1. CLIENTS */
function renderClients() {
  document.getElementById('clientTableBody').innerHTML = db.clients.map(c => `<tr><td>${c.name}</td><td><button class="btn ghost small" onclick="delClient('${c.id}')">刪除</button></td></tr>`).join('');
  const opts = db.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('newMediaClient').innerHTML = opts;
  document.getElementById('filterMediaClient').innerHTML = '<option value="ALL">顯示全部客戶</option>' + opts;
}
document.getElementById('btnAddClient').addEventListener('click', () => {
  const name = document.getElementById('newClientName').value;
  if(name) { db.clients.push({id:'c_'+Date.now(), name}); document.getElementById('newClientName').value=''; saveData(); }
});
function delClient(id) { db.clients = db.clients.filter(c => c.id !== id); saveData(); }

/* 2. MEDIA LIBRARY */
function renderMediaLibrary() {
  const filterCid = document.getElementById('filterMediaClient').value;
  let list = db.media;
  if(filterCid !== 'ALL') list = list.filter(m => m.clientId === filterCid);
  
  document.getElementById('mediaTableBody').innerHTML = list.map(m => {
    const c = db.clients.find(x => x.id === m.clientId);
    return `<tr><td><span class="pill">${c?c.name:'?'}</span></td>
            <td>${m.media}</td><td><b>${m.title}</b></td><td>${m.position}</td><td>${m.format}</td>
            <td>${m.price||'-'} / ${m.model}</td><td>${m.ac}%</td>
            <td><button class="btn ghost small" onclick="delMedia('${m.id}')">刪除</button></td></tr>`;
  }).join('');
}
document.getElementById('filterMediaClient').addEventListener('change', renderMediaLibrary);
document.getElementById('btnAddMedia').addEventListener('click', () => {
  const clientId = document.getElementById('newMediaClient').value;
  const title = document.getElementById('newMediaTitle').value;
  if(!clientId || !title) return alert("客戶與Title必填");
  db.media.push({
    id:'m_'+Date.now(), clientId,
    media:document.getElementById('newMediaMain').value, title,
    position:document.getElementById('newMediaPosition').value, format:document.getElementById('newMediaFormat').value,
    price:document.getElementById('newMediaPrice').value, model:document.getElementById('newMediaModel').value,
    ac:document.getElementById('newMediaAC').value
  });
  saveData();
});
function delMedia(id) { db.media = db.media.filter(m => m.id !== id); saveData(); }

/* 3. MEDIA CUE GENERATOR */
function renderMCClientSelect() {
  const sel = document.getElementById('mcClient');
  const prevVal = sel.value;
  sel.innerHTML = db.clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  if(prevVal && db.clients.find(c=>c.id===prevVal)) sel.value = prevVal;
  updateMCMediaDropdown();
}
document.getElementById('mcClient').addEventListener('change', () => {
  updateMCMediaDropdown();
  mcRows = []; // 切換客戶清空列表
  renderMCRows();
});

function updateMCMediaDropdown() {
  const cid = document.getElementById('mcClient').value;
  const list = db.media.filter(m => m.clientId === cid);
  document.getElementById('mcMediaSelect').innerHTML = list.map(m => 
    `<option value="${m.id}">[${m.title}] ${m.position} (${m.format}) - AC ${m.ac}%</option>`
  ).join('');
}

document.getElementById('btnAddMCRow').addEventListener('click', () => {
  const mid = document.getElementById('mcMediaSelect').value;
  if(!mid) return alert("請先選擇媒體");
  const m = db.media.find(x => x.id === mid);
  mcRows.push({ id:'r_'+Date.now(), mediaId:mid, period:'', price:0, acRate: m.ac });
  renderMCRows();
});

function renderMCRows() {
  const tbody = document.getElementById('mcTbody');
  if(mcRows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#888;padding:30px;">尚未加入媒體，請從上方選擇並點擊「新增列」</td></tr>';
    document.getElementById('mcGrandTotal').innerText = 'NT$ 0';
    return;
  }
  
  let total = 0;
  tbody.innerHTML = mcRows.map((r, i) => {
    const m = db.media.find(x => x.id === r.mediaId);
    if(!m) return '';
    const price = parseFloat(r.price) || 0;
    const rate = parseFloat(r.acRate) || 0;
    const acAmt = Math.round(price * (rate/100));
    const sub = price + acAmt;
    total += sub;
    
    return `<tr>
      <td><b>${m.title}</b><br><span style="font-size:12px;color:#888;">${m.position} | ${m.format}</span></td>
      <td><input type="text" placeholder="自訂走期" value="${r.period}" onchange="updateMCRow(${i}, 'period', this.value)"></td>
      <td><input type="number" step="any" value="${r.price}" onchange="updateMCRow(${i}, 'price', this.value)"></td>
      <td><input type="number" step="0.01" value="${r.acRate}" onchange="updateMCRow(${i}, 'acRate', this.value)"></td>
      <td>${acAmt.toLocaleString()}</td>
      <td><b>${sub.toLocaleString()}</b></td>
      <td><button class="btn ghost small" onclick="delMCRow(${i})">✕</button></td>
    </tr>`;
  }).join('');
  document.getElementById('mcGrandTotal').innerText = 'NT$ ' + total.toLocaleString();
}
function updateMCRow(idx, field, val) { mcRows[idx][field] = val; renderMCRows(); }
function delMCRow(idx) { mcRows.splice(idx, 1); renderMCRows(); }

document.getElementById('btnExportMediaCue').addEventListener('click', () => {
  if(mcRows.length === 0) return alert('請先加入媒體');
  const campName = document.getElementById('mcCampaignName').value || 'Campaign';
  const header = [
    ['Campaign Name', campName],
    ['Total Period', document.getElementById('mcTotalPeriod').value], [],
    ['Media','Title','Position/Channel','Format','Buying Model','Period','Media Price','AC%','AC Amt.','Total Budget']
  ];
  let grandTotal = 0;
  const rows = mcRows.map(r => {
    const m = db.media.find(x => x.id === r.mediaId) || {};
    const p = parseFloat(r.price)||0; const ac = parseFloat(r.acRate)||0;
    const amt = Math.round(p*(ac/100)); const total = p+amt; grandTotal += total;
    return [m.media, m.title, m.position, m.format, m.model, r.period, p, ac+'%', amt, total];
  });
  rows.push(['','','','','','','','','Total', grandTotal]);
  
  const ws = XLSX.utils.aoa_to_sheet([...header, ...rows]);
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Media Cue");
  XLSX.writeFile(wb, campName + "_MediaCue.xlsx");
});

/* 4. SPECS */
function renderSpecs() {
  document.getElementById('specChecklist').innerHTML = db.specs.map(s => 
    `<label style="padding:10px; border:1px solid #ddd; margin-bottom:10px; border-radius:6px; display:block;">
      <input type="checkbox" class="spec-cb" data-id="${s.id}"> <b>${s.platform} - ${s.format}</b>: ${s.content}
    </label>`
  ).join('');
}
document.getElementById('btnExportSpecs').addEventListener('click', () => {
  const selectedIds = Array.from(document.querySelectorAll('.spec-cb:checked')).map(cb=>cb.dataset.id);
  if(selectedIds.length === 0) return alert('未勾選規範');
  const rows = [['Platform','Format','Spec']];
  selectedIds.forEach(id => {
    const s = db.specs.find(x=>x.id===id); if(s) rows.push([s.platform, s.format, s.content]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Specs");
  XLSX.writeFile(wb, "Specs.xlsx");
});

loadData();
</script>
</body>
</html>
